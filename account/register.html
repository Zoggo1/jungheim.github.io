<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren | Dein Projekt</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { color: #2d3748; margin-bottom: 0.5rem; font-weight: 700; }
        p { color: #718096; margin-bottom: 2rem; font-size: 0.95rem; }

        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #4a5568;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        #message {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; display: block !important; }
        .success { background: #f0fff4; color: #2f855a; border: 1px solid #9ae6b4; display: block !important; }
        
        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #718096;
        }
        
        .footer-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="register-card">
    <h2>Account erstellen</h2>
    <p>Tritt unserer Community bei</p>
    
    <div class="input-group">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="beispiel@mail.de">
    </div>
    <div class="input-group">
        <label for="password">Passwort (min. 6 Zeichen)</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    
    <button onclick="handleRegister()">Jetzt registrieren</button>
    
    <div id="message"></div>

    <div class="footer-text">
        Bereits ein Konto? <a href="login.html">Hier einloggen</a>
    </div>
</div>

<script>
    // Diese Funktion wird erst ausgeführt, wenn alles geladen ist
    async function handleRegister() {
        const msgDiv = document.getElementById('message');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // 1. Sichtbares Feedback geben, dass der Klick registriert wurde
        msgDiv.style.display = 'block';
        msgDiv.className = ''; 
        msgDiv.innerText = 'Verbindung wird aufgebaut...';

        // 2. Sicherheits-Check: Ist Supabase überhaupt geladen?
        if (typeof supabase === 'undefined') {
            msgDiv.innerText = "Fehler: Die Supabase-Bibliothek konnte nicht geladen werden. Bitte Seite neu laden oder Adblocker prüfen.";
            msgDiv.className = 'error';
            return;
        }

        // 3. Client initialisieren (nur wenn er noch nicht existiert)
        const SUPABASE_URL = 'https://hlcapqbkwfxlvrdedhsn.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_hhaNeuG7r1pV7U-A4djxuQ_p55N_-hJ';
        
        try {
            const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            const { data, error } = await client.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                msgDiv.innerText = "Fehler: " + error.message;
                msgDiv.className = 'error';
            } else {
                msgDiv.innerText = "Erfolg! Bitte schau in dein E-Mail-Postfach.";
                msgDiv.className = 'success';
            }
        } catch (err) {
            msgDiv.innerText = "Kritischer Fehler: " + err.message;
            msgDiv.className = 'error';
        }
    }
</script>


</body>
</html>
