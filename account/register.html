<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .form-container { background: #f4f4f4; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #3ecf8e; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #36b87d; }
        .msg { margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Konto erstellen</h2>
    <input type="email" id="reg-email" placeholder="Deine E-Mail">
    <input type="password" id="reg-password" placeholder="Passwort wählen">
    <button onclick="signUp()">Registrieren</button>
    <div id="message" class="msg"></div>
    <p style="font-size: 0.8em; margin-top: 15px;">
        Schon ein Konto? <a href="login.html">Hier einloggen</a>
    </p>
</div>

<script>
    async function signUp() {
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const messageDiv = document.getElementById('message');

        messageDiv.innerText = "Lade...";

        // Supabase Registrierungs-Funktion
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
        });

        if (error) {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Fehler: " + error.message;
        } else {
            messageDiv.style.color = "green";
            messageDiv.innerText = "Erfolg! Bitte schau in dein E-Mail-Postfach und bestätige den Link.";
        }
    }
</script>

</body>
</html>
