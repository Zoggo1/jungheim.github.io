<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | </title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('riesenrad.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
            position: relative;
            background-color: #0f172a;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.25);
            z-index: 1;
        }

        .login-box {
            position: relative;
            width: 380px;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 45px;
            font-weight: 500;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            position: relative;
            margin-bottom: 35px;
        }

        .input-group i {
            position: absolute;
            left: 0;
            top: 12px;
            color: rgba(0, 0, 0, 0.3);
            font-size: 16px;
            transition: 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 12px 5px 12px 30px;
            font-size: 15px;
            color: #ffffff;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.4);
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: static;
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
            transition: 0.3s ease;
            font-size: 13px;
            font-weight: 600;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            color: #38bdf8;
        }

        .input-group input:focus ~ i,
        .input-group input:valid ~ i {
            color: #38bdf8;
        }

        .input-group input:focus,
        .input-group input:valid {
            border-bottom: 1.5px solid #38bdf8;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #0284c7;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            color: #ffffff;
            font-size: 13px;
        }

        .signup-link a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .signup-link a:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        #message {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            display: block !important;
        }

        .success {
            background: #ecfdf5;
            color: #166534;
            border: 1px solid #a7f3d0;
            display: block !important;
        }
    </style>
</head>
<body>
    
    <div class="login-box">
        <form id="registerForm">
            <h2>Registrieren</h2>
            
            <div class="input-group">
                <label>Benutzername *</label>
                <div style="position: relative;">
                    <i class="fas fa-user" style="position: absolute; left: 0; top: 12px; color: rgba(0, 0, 0, 0.3); font-size: 16px;"></i>
                    <input type="text" id="username" placeholder="dein Benutzername" required style="padding-left: 30px;">
                </div>
            </div>
            <div class="input-group">
                <label>E-Mail</label>
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 0; top: 12px; color: rgba(0, 0, 0, 0.3); font-size: 16px;"></i>
                    <input type="email" id="email" placeholder="email@beispiel.de" required style="padding-left: 30px;">
                </div>
            </div>
            <div class="input-group">
                <label>Passwort (min. 6 Zeichen)</label>
                <div style="position: relative;">
                    <i class="fas fa-lock" style="position: absolute; left: 0; top: 12px; color: rgba(0, 0, 0, 0.3); font-size: 16px;"></i>
                    <input type="password" id="password" placeholder="••••••••" required style="padding-left: 30px;">
                </div>
            </div>
            
            <button type="submit" class="login-btn">Jetzt registrieren</button>
            
            <div id="message"></div>

            <div class="signup-link">
                Bereits ein Konto? <a href="login.html">Hier einloggen</a>
            </div>
        </form>
    </div>

<script>
    const SUPABASE_URL = 'https://hlcapqbkwfxlvrdedhsn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_hhaNeuG7r1pV7U-A4djxuQ_p55N_-hJ';
    let client = null;

    window.addEventListener('DOMContentLoaded', () => {
        if (typeof supabase === 'undefined') {
            const msgDiv = document.getElementById('message');
            msgDiv.style.display = 'block';
            msgDiv.className = 'error';
            msgDiv.innerText = 'Supabase konnte nicht geladen werden. Bitte Seite neu laden.';
            return;
        }

        client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const registerForm = document.getElementById('registerForm');
        if (registerForm) {
            registerForm.addEventListener('submit', (event) => {
                event.preventDefault();
                handleRegister();
            });
        }
    });

    async function handleRegister() {
        const msgDiv = document.getElementById('message');
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        msgDiv.style.display = 'block';
        msgDiv.className = '';
        msgDiv.innerText = 'Verbindung wird aufgebaut...';

        if (!username || !email || !password) {
            msgDiv.innerText = 'Bitte gib Benutzername, E-Mail und Passwort ein.';
            msgDiv.className = 'error';
            return;
        }

        if (password.length < 6) {
            msgDiv.innerText = 'Das Passwort muss mindestens 6 Zeichen haben.';
            msgDiv.className = 'error';
            return;
        }

        if (!client) {
            msgDiv.innerText = 'Fehler: Supabase konnte nicht initialisiert werden. Bitte Seite neu laden.';
            msgDiv.className = 'error';
            return;
        }

        try {
            const { data, error } = await client.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        username,
                        full_name: username,
                    },
                },
            });

            if (error) {
                msgDiv.innerText = 'Error: ' + error.message;
                msgDiv.className = 'error';
            } else {
                // Profil in der profiles-Tabelle erstellen
                if (data?.user?.id) {
                    const profileUpdate = await client.from('profiles').upsert({
                        id: data.user.id,
                        username,
                        full_name: username,
                    });
                    if (profileUpdate.error) {
                        console.error('Profile creation error:', profileUpdate.error);
                    }
                }

                msgDiv.innerText = 'Erfolg! Bitte schau in dein E-Mail-Postfach.';
                msgDiv.className = 'success';
            }
        } catch (err) {
            msgDiv.innerText = 'Kritischer Fehler: ' + err.message;
            msgDiv.className = 'error';
        }
    }
</script>


</body>
</html>
