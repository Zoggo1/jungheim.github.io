<body>

<div class="form-container">
    <h2>Konto erstellen</h2>
    <input type="email" id="reg-email" placeholder="Deine E-Mail">
    <input type="password" id="reg-password" placeholder="Passwort wählen">
    <button onclick="signUp()">Registrieren</button>
    <div id="message" class="msg"></div>
</div>

<script>
    async function signUp() {
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const messageDiv = document.getElementById('message');

        messageDiv.innerText = "Sende Daten an Supabase...";

        try {
            // Test, ob Supabase überhaupt geladen wurde
            if (typeof supabase === 'undefined') {
                alert("FEHLER: Supabase ist nicht definiert! Prüfe, ob deine config.js richtig geladen wird.");
                return;
            }

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                // Das zeigt uns den genauen Fehlergrund von Supabase
                alert("Supabase Fehler: " + error.message);
                messageDiv.innerText = "Fehler: " + error.message;
            } else {
                alert("ERFOLG! Der User wurde angelegt. Check jetzt deine E-Mails.");
                messageDiv.innerText = "Bestätigungs-Mail wurde versendet!";
            }
        } catch (err) {
            alert("System-Fehler: " + err.message);
            messageDiv.innerText = "Ein Fehler ist aufgetreten.";
        }
    }
</script>

</body>
