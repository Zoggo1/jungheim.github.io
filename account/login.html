<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Heimatfest</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="Style.css">
</head>

<body>
    
    <div class="login-box">
        <form id="login-form">
            <h2>Login</h2>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="identifier" placeholder="Benutzername oder E-Mail" required>
                <label>Benutzername oder E-Mail</label>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" required>
                <label>Passwort</label>
            </div>
            
            <button type="submit" id="submitBtn" class="login-btn">Sign In</button>

            <div id="message"></div>

            <p class="signup-link">
                <a href="password-reset.html">Passwort vergessen?</a>
            </p>
            <p class="signup-link">
                New here? <a href="register.html">Create Account</a>
            </p>   
        </form>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
