<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort zurücksetzen | Dein Projekt</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            color-scheme: light;
            --body-bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-color: #111827;
            --subtext-color: #475569;
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --button-bg: #667eea;
            --button-hover: #5a67d8;
            --button-text: #ffffff;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
            --link-color: #667eea;
        }

        body.dark {
            color-scheme: dark;
            --body-bg: radial-gradient(circle at top, #020617 0%, #0b1120 55%, #111827 100%);
            --card-bg: #111827;
            --text-color: #e2e8f0;
            --subtext-color: #cbd5e1;
            --input-bg: #1f2937;
            --input-border: #334155;
            --button-bg: #7c3aed;
            --button-hover: #8b5cf6;
            --button-text: #ffffff;
            --shadow: 0 15px 35px rgba(0,0,0,0.35);
            --link-color: #93c5fd;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--body-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(148,163,184,0.25);
        }

        .theme-toggle {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: transparent;
            border: 1px solid var(--input-border);
            color: var(--text-color);
            padding: 0.65rem 0.9rem;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-1px);
        }

        h2 { color: var(--text-color); margin-bottom: 0.5rem; font-weight: 700; }
        p { color: var(--subtext-color); margin-bottom: 1.5rem; font-size: 0.95rem; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--subtext-color); font-weight: 600; }
        input { width: 100%; padding: 12px 16px; border: 1px solid var(--input-border); border-radius: 10px; box-sizing: border-box; font-size: 1rem; transition: all 0.3s ease; background: var(--input-bg); color: var(--text-color); }
        input::placeholder { color: rgba(71, 85, 105, 0.65); }
        body.dark input::placeholder { color: rgba(203, 213, 225, 0.65); }
        input:focus { border-color: var(--button-bg); outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12); }
        button {
            width: 100%;
            padding: 14px;
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 1rem;
        }
        button:hover { background: var(--button-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        #message { margin-top: 1.5rem; font-size: 0.9rem; padding: 12px; border-radius: 8px; display: none; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block !important; }
        .success { background: #ecfdf5; color: #166534; border: 1px solid #a7f3d0; display: block !important; }
        .footer-text { margin-top: 1.5rem; font-size: 0.85rem; color: var(--subtext-color); }
        .footer-text a { color: var(--link-color); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <button id="themeToggle" type="button" class="theme-toggle">Dark Mode</button>
        <h2>Passwort zurücksetzen</h2>
        <p>Gib deine E-Mail ein und wir senden dir einen Reset-Link.</p>

        <form id="resetForm">
            <div class="input-group">
                <label for="resetEmail">E-Mail</label>
                <input type="email" id="resetEmail" placeholder="beispiel@mail.de" required>
            </div>
            <button type="submit">Reset-Link senden</button>
            <div id="message"></div>
            <div class="footer-text">
                Zurück zum <a href="login.html">Einloggen</a>
            </div>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://hlcapqbkwfxlvrdedhsn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hhaNeuG7r1pV7U-A4djxuQ_p55N_-hJ';
        const THEME_KEY = 'themePreference';
        let client = null;

        function setTheme(theme) {
            document.body.classList.toggle('dark', theme === 'dark');
            document.getElementById('themeToggle').textContent = theme === 'dark' ? 'White Mode' : 'Dark Mode';
            localStorage.setItem(THEME_KEY, theme);
        }

        function initTheme() {
            const stored = localStorage.getItem(THEME_KEY);
            const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            setTheme(theme);
        }

        function showMessage(text, type = 'error') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = type;
            msg.style.display = 'block';
        }

        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            document.getElementById('themeToggle').addEventListener('click', () => {
                setTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
            });

            if (typeof supabase !== 'undefined') {
                client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }

            const resetForm = document.getElementById('resetForm');
            if (resetForm) {
                resetForm.addEventListener('submit', (event) => {
                    event.preventDefault();
                    handlePasswordReset();
                });
            }
        });

        async function handlePasswordReset() {
            const msgDiv = document.getElementById('message');
            const email = document.getElementById('resetEmail').value.trim();

            msgDiv.style.display = 'block';
            msgDiv.className = '';
            msgDiv.innerText = 'Sende Reset-Link...';

            if (!email) {
                showMessage('Bitte gib deine E-Mail-Adresse ein.', 'error');
                return;
            }

            if (!client) {
                showMessage('Fehler: Supabase konnte nicht geladen werden. Bitte Seite neu laden.', 'error');
                return;
            }

            try {
                const { data, error } = await client.auth.resetPasswordForEmail(email);
                if (error) {
                    showMessage('Fehler: ' + error.message, 'error');
                    return;
                }

                showMessage('Reset-Link wurde gesendet. Bitte prüfe dein E-Mail-Postfach.', 'success');
            } catch (err) {
                showMessage('Kritischer Fehler: ' + err.message, 'error');
            }
        }
    </script>
</body>
</html>
