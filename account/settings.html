<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account-Einstellungen | Dein Projekt</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            color-scheme: light;
            --body-bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-color: #111827;
            --subtext-color: #475569;
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --button-bg: #667eea;
            --button-hover: #5a67d8;
            --button-text: #ffffff;
            --shadow: 0 25px 50px rgba(0,0,0,0.08);
            --link-color: #667eea;
        }

        body.dark {
            color-scheme: dark;
            --body-bg: radial-gradient(circle at top, #020617 0%, #0b1120 55%, #111827 100%);
            --card-bg: #111827;
            --text-color: #e2e8f0;
            --subtext-color: #cbd5e1;
            --input-bg: #1f2937;
            --input-border: #334155;
            --button-bg: #7c3aed;
            --button-hover: #8b5cf6;
            --button-text: #ffffff;
            --shadow: 0 25px 50px rgba(0,0,0,0.22);
            --link-color: #93c5fd;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--body-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: min(520px, 100%);
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(148,163,184,0.25);
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: 1px solid var(--input-border);
            color: var(--text-color);
            padding: 0.65rem 0.9rem;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-1px);
        }

        h2 { color: var(--text-color); margin-bottom: 0.5rem; font-weight: 700; }
        p { color: var(--subtext-color); margin-bottom: 1.5rem; }
        .meta { margin-bottom: 0.75rem; color: var(--subtext-color); }
        .meta strong { color: var(--text-color); }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--subtext-color); font-weight: 600; }
        input { width: 100%; padding: 12px 16px; border: 1px solid var(--input-border); border-radius: 12px; font-size: 1rem; background: var(--input-bg); color: var(--text-color); }
        input:focus { outline: none; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); border-color: var(--button-bg); }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--button-text);
            background: var(--button-bg);
            transition: background 0.24s ease;
        }
        button:hover { background: var(--button-hover); }
        .secondary { background: #2d3748; }
        .secondary:hover { background: #1f2937; }
        .message { margin-top: 1.5rem; padding: 12px; border-radius: 12px; display: none; }
        .success { background: #ecfdf5; color: #166534; border: 1px solid #a7f3d0; display: block; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block; }
        .actions { display: grid; gap: 0.75rem; margin-top: 1.5rem; }
        .actions a { text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <button id="themeToggle" type="button" class="theme-toggle">Dark Mode</button>
        <h2>Account-Einstellungen</h2>
        <p>Nur angemeldete Benutzer kommen hierher. Du kannst dein Profil ansehen, aktualisieren oder dich abmelden.</p>

        <div class="meta">Eingeloggt als: <strong id="userEmail">Lade...</strong></div>
        <div class="meta">Benutzer-ID: <strong id="userId">Lade...</strong></div>

        <form id="profileForm">
            <div class="input-group">
                <label for="fullName">Name / Anzeige</label>
                <input type="text" id="fullName" placeholder="Dein Name" autocomplete="name">
            </div>
            <div class="input-group">
                <label for="newEmail">Neue E-Mail (optional)</label>
                <input type="email" id="newEmail" placeholder="neue@mail.de" autocomplete="email">
            </div>
            <button type="submit">Profil aktualisieren</button>
        </form>

        <div class="actions">
            <a href="forum.html" class="secondary">Zum Forum</a>
            <button id="logoutButton" type="button">Abmelden</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hlcapqbkwfxlvrdedhsn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_hhaNeuG7r1pV7U-A4djxuQ_p55N_-hJ';
        const THEME_KEY = 'themePreference';
        let client = null;

        function setTheme(theme) {
            document.body.classList.toggle('dark', theme === 'dark');
            document.getElementById('themeToggle').textContent = theme === 'dark' ? 'White Mode' : 'Dark Mode';
            localStorage.setItem(THEME_KEY, theme);
        }

        function initTheme() {
            const stored = localStorage.getItem(THEME_KEY);
            const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            setTheme(theme);
        }

        function showMessage(text, type = 'error') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }

        async function loadUser() {
            const { data, error } = await client.auth.getUser();
            if (error || !data?.user) {
                window.location.href = 'login.html';
                return;
            }
            const user = data.user;
            document.getElementById('userEmail').textContent = user.email || 'Unbekannt';
            document.getElementById('userId').textContent = user.id;
            document.getElementById('fullName').value = user.user_metadata?.full_name || '';
        }

        async function updateProfile(event) {
            event.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const newEmail = document.getElementById('newEmail').value.trim();

            const updateData = { data: { full_name: fullName } };
            if (newEmail) {
                updateData.email = newEmail;
            }

            const { data, error } = await client.auth.updateUser(updateData);
            if (error) {
                showMessage('Fehler: ' + error.message, 'error');
                return;
            }

            showMessage('Profil aktualisiert!', 'success');
            if (data?.user?.email) {
                document.getElementById('userEmail').textContent = data.user.email;
            }
            document.getElementById('newEmail').value = '';
        }

        async function logout() {
            await client.auth.signOut();
            window.location.href = 'login.html';
        }

        window.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            document.getElementById('themeToggle').addEventListener('click', () => {
                setTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
            });

            if (typeof supabase === 'undefined') {
                document.body.innerHTML = '<div style="padding: 2rem; font-family: sans-serif;">Supabase konnte nicht geladen werden. Bitte Seite neu laden.</div>';
                return;
            }
            client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            await loadUser();
            document.getElementById('profileForm').addEventListener('submit', updateProfile);
            document.getElementById('logoutButton').addEventListener('click', logout);
        });
    </script>
</body>
</html>
